# Global config. Secrets (keys) live in the environment, NOT here.

provider:
  name: openrouter
  default_model: "google/gemini-2.5-flash:free"

budgets:
  max_tokens_per_run: 8000

guardrails:
  safeai:
    enabled: false
    url: "https://safeai613.com/moderate"

# Domain allowlist for tool-using agents (web tool, http MCP servers). Empty = none.
security:
  domain_allowlist:
    - "mcp.safeai613.com"

# MCP layer (core/tools/mcp). Which local executables stdio servers may launch.
# Empty list = allow any (dev). Lock this down in production.
mcp:
  command_allowlist:
    - "npx"
    - "uvx"
    - "safeai-mcp"

# Code execution (core/tools/code_exec). OFF by default.
code_exec:
  enabled: false        # set true to allow the workbench agent to run code
  allow_host: false     # NEVER true in production — runs code on the host with no isolation
  timeout_seconds: 20
  memory: "256m"

# Files API workspace root (core/server file endpoints). The UI's file browser is scoped here.
files:
  workspace: "~/ai-agents-workspace"

# Speech-to-text backend for the /stt endpoint. "local" = faster-whisper (pip extra).
stt:
  backend: "local"      # "local" | "disabled"
  model: "base"         # faster-whisper model size: tiny|base|small|medium|large-v3
  language: "he"
